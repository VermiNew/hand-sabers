<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="description" content="Biblioteka map i wyników Hand Sabers.">
<title>Hand Sabers — Mapy</title>
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./src/styles/maps.css">
</head>
<body>

<div class="maps-layout">

  <!-- ── Topbar ── -->
  <header class="maps-topbar">
    <a class="topbar-back" href="./beat-sabers-3d.html">
      <span class="material-symbols-rounded">arrow_back</span>
      <span data-i18n="maps.backToGame">GRA</span>
    </a>

    <div class="topbar-brand">HAND SABERS</div>

    <div class="topbar-tabs">
      <button class="topbar-tab is-active" data-tab="maps" type="button">
        <span data-i18n="maps.tabMaps">MAPY</span>
      </button>
      <button class="topbar-tab" data-tab="scores" type="button">
        <span data-i18n="maps.tabScores">WYNIKI</span>
      </button>
    </div>

    <div class="topbar-spacer"></div>

    <div class="topbar-search">
      <span class="material-symbols-rounded">search</span>
      <input id="searchInput" class="search-input" type="search"
             placeholder="Szukaj map…" data-i18n-placeholder="maps.searchPlaceholder" autocomplete="off" spellcheck="false">
    </div>

    <div class="topbar-actions">
      <button class="topbar-btn" id="btnImportMap" type="button">
        <span class="material-symbols-rounded">upload</span>
        <span data-i18n="maps.importZip">IMPORT ZIP</span>
      </button>
      <input type="file" id="importMapInput" accept=".zip,.json" hidden>
      <a class="topbar-btn accent" href="./map-creator.html">
        <span data-i18n="maps.newMap">NOWA MAPA</span>
      </a>
    </div>
  </header>

  <!-- ── Body ── -->
  <div class="maps-body">

    <!-- ── Maps tab ── -->
    <div id="tabMaps" class="maps-tab is-active" style="display:contents">

      <!-- Left: list pane -->
      <div class="maps-list-pane">
        <div class="maps-filter-bar">
          <span class="filter-label" data-i18n="maps.filterDiff">Trudność</span>
          <button class="filter-chip" data-diff="easy"   type="button" data-i18n="maps.diffEasy">EASY</button>
          <button class="filter-chip" data-diff="medium" type="button" data-i18n="maps.diffMedium">MEDIUM</button>
          <button class="filter-chip" data-diff="hard"   type="button" data-i18n="maps.diffHard">HARD</button>
          <button class="filter-chip" data-diff="expert" type="button" data-i18n="maps.diffExpert">EXPERT</button>
          <select class="filter-sort" id="sortSelect" aria-label="Sortowanie" data-i18n-aria-label="maps.sortAria">
            <option value="newest"  data-i18n="maps.sortNewest">Najnowsze</option>
            <option value="alpha"   data-i18n="maps.sortAlpha">Alfabetycznie</option>
            <option value="beats"   data-i18n="maps.sortBeats">Beatów (malejąco)</option>
            <option value="score"   data-i18n="maps.sortScore">Najlepszy wynik</option>
          </select>
        </div>

        <div class="maps-scroll">
          <div id="offlineNotice" class="offline-notice" hidden>
            <span class="material-symbols-rounded">wifi_off</span>
            <span data-i18n="maps.serverFallback">Serwer nie odpowiada — pokazuję lokalne mapy.</span>
          </div>
          <div id="mapList"></div>
        </div>
      </div>

      <!-- Right: detail pane -->
      <div class="maps-detail-pane">
        <div id="detailPane" class="detail-empty">
          <span class="material-symbols-rounded">arrow_back</span>
          <div class="detail-empty-hint" data-i18n="maps.selectFromList">WYBIERZ MAPĘ Z LISTY</div>
        </div>
      </div>

    </div>

    <!-- ── Scores tab ── -->
    <div id="tabScores" class="scores-pane">
      <div class="scores-scroll">
        <div id="scoreList"></div>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { init } from './src/maps/maps.ts';
init();
</script>
</body>
</html>
